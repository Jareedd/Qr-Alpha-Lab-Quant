name: live-paper-trading

on:
  schedule:
    # 22:30 UTC weekdays = comfortably after US close year-round (EST/EDT).
    - cron: "30 22 * * 1-5"
  workflow_dispatch: {}  # manual trigger for testing

permissions:
  contents: write  # the run commits its prediction log back to the repo

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      # The data-revision monitor diffs today's price download against the
      # previous cycle's snapshot -- but CI runners are ephemeral, so the
      # snapshots must ride the Actions cache between runs (restore-keys
      # prefix match picks the most recent prior run's cache).
      - name: Restore prior price snapshots (data-revision monitor)
        uses: actions/cache/restore@v4
        with:
          path: data_cache
          key: live-snapshots-${{ github.run_id }}  # never hits; restore-keys does
          restore-keys: live-snapshots-
      - name: Daily paper trade (skips gracefully if secrets unset)
        env:
          ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
          ALPACA_API_SECRET_KEY: ${{ secrets.ALPACA_API_SECRET_KEY }}
        run: |
          if [ -z "$ALPACA_API_KEY_ID" ]; then
            echo "Alpaca secrets not configured -> skipping (see README Phase 6)"
            exit 0
          fi
          python scripts/live_trade.py
      - name: Refresh monitoring report (non-fatal -- trading already logged)
        run: python scripts/live_report.py || echo "report failed; cycle log is intact"
      # Keep only the newest 7 snapshot dirs before saving: the revision
      # JSONs (committed above) are the durable measurements; raw snapshots
      # are only needed pairwise, so the cache stays ~100MB instead of
      # growing without bound.
      - name: Prune and save today's price snapshot
        if: always()
        run: ls -d data_cache/live_* 2>/dev/null | sort | head -n -7 | xargs -r rm -rf
      - uses: actions/cache/save@v4
        if: always()
        with:
          path: data_cache
          key: live-snapshots-${{ github.run_id }}
      - name: Commit prediction log (the immutable live-IC record)
        run: |
          git config user.name "qr-alpha-lab live bot"
          git config user.email "actions@users.noreply.github.com"
          git add results/live
          git diff --cached --quiet || git commit -m "live: prediction log $(date -u +%F)"
          git push
